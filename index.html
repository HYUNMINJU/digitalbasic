<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>디지털 기초 — 무엇을 배울까요?</title>
<style>
:root{
  --bg:#F4F6FA; --ink:#191F28; --sub:#6B7684; --card:#FFFFFF;
  --accent:#3182F6; --accent-soft:#EBF3FF;
  --shadow-sm:0 1px 3px rgba(25,31,40,.05), 0 4px 14px rgba(25,31,40,.06);
  --shadow-md:0 2px 6px rgba(25,31,40,.05), 0 14px 34px rgba(25,31,40,.10);
  color-scheme: light;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; height:100%;}
body{
  font-family:"Pretendard Variable",Pretendard,"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:var(--bg); color:var(--ink);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; min-height:100dvh; padding:24px;
  touch-action:manipulation; -webkit-user-select:none; user-select:none;
}
a{text-decoration:none; color:inherit;}
a:focus-visible{outline:4px solid #94C1FF; outline-offset:3px;}
h1{font-size:clamp(30px,3.8vw,52px); font-weight:800; letter-spacing:-1.5px; text-align:center; margin:0;}
.cards{display:flex; gap:26px; justify-content:center; flex-wrap:wrap; margin-top:34px;}
.card{
  position:relative; width:min(350px,90vw); min-height:300px;
  background:var(--card); border-radius:32px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
  box-shadow:var(--shadow-sm);
  transition:transform .18s ease, box-shadow .18s ease;
}
.card:hover{transform:translateY(-6px); box-shadow:var(--shadow-md);}
.card:active{transform:translateY(0) scale(.98);}
.cicon{
  width:140px; height:140px; border-radius:50%; background:var(--accent-soft);
  display:flex; align-items:center; justify-content:center;
  font-size:72px; line-height:1;
}
.cnum{font-size:clamp(17px,1.8vw,22px); font-weight:800; color:var(--accent);}
.cname{font-size:clamp(23px,2.3vw,32px); font-weight:800; letter-spacing:-.5px; padding:0 12px; text-align:center;}
@media (prefers-reduced-motion:reduce){.card{transition:none;}}
/* 카드가 4장이 되면서 1024×600·1366×768에서 뒤쪽 장이 아래로 밀린다.
   한 줄에 다 들어가도록 세로가 짧은 화면에서 카드를 줄인다. */
@media (max-height:860px){
  body{padding:14px;}
  h1{font-size:clamp(24px,2.8vw,34px);}
  .cards{gap:14px; margin-top:18px; flex-wrap:nowrap;}
  .card{width:min(220px,23vw); min-height:200px; gap:12px; border-radius:24px; padding:10px;}
  .cicon{width:86px; height:86px; font-size:44px;}
  .cnum{font-size:16px;}
  .cname{font-size:clamp(17px,1.7vw,21px);}
}
@media (max-width:760px){
  .cards{flex-wrap:wrap;}
  .card{width:min(320px,88vw);}
}
</style>
</head>
<body>
<h1>무엇을 배울까요?</h1>
<div class="cards">
  <a class="card" href="lesson1.html">
    <span class="cicon">💻</span>
    <span class="cnum">1차시</span>
    <span class="cname">컴퓨터와 친해지기</span>
  </a>
  <a class="card" href="lesson2.html">
    <span class="cicon">⌨️</span>
    <span class="cnum">2차시</span>
    <span class="cname">키보드와 친해지기</span>
  </a>
  <a class="card" href="lesson3.html">
    <span class="cicon">🤖</span>
    <span class="cnum">3차시</span>
    <span class="cname">AI는 어떻게 배울까요?</span>
  </a>
  <a class="card" href="lesson4.html">
    <span class="cicon">💬</span>
    <span class="cnum">4차시</span>
    <span class="cname">AI와 이야기 나누기</span>
  </a>
</div>
</body>
</html>
