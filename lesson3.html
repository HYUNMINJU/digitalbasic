<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>디지털 기초 3차시 — AI는 어떻게 배울까요?</title>
<style>
:root{
  --bg:#F4F6FA; --ink:#191F28; --sub:#6B7684; --card:#FFFFFF;
  --accent:#3182F6; --accent-deep:#1B64DA; --accent-soft:#EBF3FF;
  --green:#0BA360; --green-soft:#E6F6EC; --sun:#FFC342;
  --grape:#7C5CFF; --grape-soft:#F0ECFF;
  --hair:rgba(25,31,40,.07);
  --shadow-sm:0 1px 3px rgba(25,31,40,.05), 0 4px 14px rgba(25,31,40,.06);
  --shadow-md:0 2px 6px rgba(25,31,40,.05), 0 14px 34px rgba(25,31,40,.10);
  color-scheme: light;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; height:100%;}
body{
  font-family:"Pretendard Variable",Pretendard,"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:var(--bg); color:var(--ink);
  display:flex; flex-direction:column;
  min-height:100vh; min-height:100dvh;
  touch-action:manipulation;
  -webkit-user-select:none; user-select:none;
}
button{font:inherit; color:inherit; cursor:pointer; border:none; background:none;}
/* 문서 요구: 포커스 테두리를 굵고 명확하게 */
button:focus-visible{outline:4px solid #94C1FF; outline-offset:3px;}

/* ===== 셸 ===== */
header{
  display:flex; align-items:center; gap:14px;
  padding:14px 22px; background:var(--card);
  box-shadow:0 1px 0 var(--hair), 0 4px 16px rgba(25,31,40,.04);
  position:relative; z-index:5;
}
#title{
  flex:1; text-align:center; font-weight:800;
  font-size:clamp(20px,2.2vw,30px); letter-spacing:-.5px;
}
.hbtn{
  min-height:68px; padding:10px 26px; border-radius:999px;
  background:#F2F4F8; font-weight:700;
  font-size:clamp(17px,1.7vw,24px);
  transition:background .15s ease, transform .1s ease;
}
.hbtn:hover{background:#E8ECF2;}
.hbtn:active{transform:scale(.96);}

main#stage{
  flex:1; min-height:0; overflow:auto;
  display:flex; flex-direction:column; align-items:center;
  padding:20px 22px;
}
footer#dots{
  display:flex; align-items:center; justify-content:center; gap:10px; padding:16px;
  flex-wrap:wrap;
}
footer#dots:empty{display:none;}
.d{width:13px; height:13px; border-radius:999px; background:#D8DEE8; transition:all .25s ease;}
.d.done{background:var(--green);}
.d.cur{width:38px; background:var(--accent);}

/* ===== 지시문 ===== */
.say{
  margin:8px 0 14px; text-align:center; font-weight:800;
  font-size:clamp(26px,3.4vw,44px); letter-spacing:-1px; text-wrap:balance;
}

/* ===== 홈 ===== */
.home{width:100%; max-width:1500px; text-align:center; margin:auto;}
.home h1{font-size:clamp(30px,3.8vw,52px); font-weight:800; letter-spacing:-1.5px;}
.cards{display:flex; gap:26px; justify-content:center; flex-wrap:wrap; margin-top:34px;}
.card{
  position:relative; width:min(330px,90vw); min-height:300px;
  background:var(--card); border-radius:32px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
  box-shadow:var(--shadow-sm);
  transition:transform .18s ease, box-shadow .18s ease;
}
.card:hover{transform:translateY(-6px); box-shadow:var(--shadow-md);}
.card:active{transform:translateY(0) scale(.98);}
.cicon{
  width:140px; height:140px; border-radius:50%; background:var(--accent-soft);
  display:flex; align-items:center; justify-content:center;
  font-size:72px; line-height:1;
}
.cname{font-size:clamp(23px,2.3vw,32px); font-weight:800; letter-spacing:-.5px; padding:0 12px;}
.badge{
  position:absolute; top:18px; right:18px; background:var(--green-soft); color:#087F46;
  border-radius:999px; padding:9px 18px; font-weight:800; font-size:17px;
}
.pickerlink{
  display:inline-block; margin-top:34px; padding:14px 30px; border-radius:999px;
  background:var(--card); color:var(--sub); font-weight:700;
  font-size:clamp(17px,1.8vw,23px); text-decoration:none; box-shadow:var(--shadow-sm);
  transition:transform .12s ease, color .12s ease;
}
.pickerlink:hover{color:var(--accent); transform:translateY(-2px);}
.pickerlink:focus-visible{outline:4px solid #94C1FF; outline-offset:3px;}

/* ===== 큰 버튼 ===== */
/* 문서 기준: 높이 70px 이상, 글자 22px 이상 */
.big-btn{
  flex:none;
  min-height:92px; min-width:280px; padding:18px 52px;
  border-radius:999px;
  background:var(--accent); color:#fff; font-weight:800;
  font-size:clamp(23px,2.5vw,34px); letter-spacing:-.5px;
  box-shadow:0 10px 26px rgba(49,130,246,.35);
  transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
}
.big-btn:hover{filter:brightness(1.06);}
.big-btn:active{transform:translateY(2px) scale(.98); box-shadow:0 5px 14px rgba(49,130,246,.3);}
.big-btn.green{background:var(--green); box-shadow:0 10px 26px rgba(11,163,96,.35);}
.big-btn.green:active{box-shadow:0 5px 14px rgba(11,163,96,.3);}
/* 아직 누를 수 없는 버튼 — '틀렸다'가 아니라 '아직'이라는 뜻으로 조용하게 */
.big-btn[disabled]{
  background:#D8DEE8; color:#8B95A5; box-shadow:none; cursor:default;
}
.big-btn[disabled]:hover{filter:none;}
.big-btn[disabled]:active{transform:none;}
/* 문서 기준: 버튼 사이 간격 16px 이상 */
.btnrow{
  display:flex; gap:20px; justify-content:center; align-items:center; flex-wrap:wrap;
  margin-top:16px; flex:none;
}
.btn-ghost{
  min-height:78px; padding:16px 36px; border-radius:999px;
  background:var(--card); color:var(--sub); font-weight:800;
  font-size:clamp(20px,2.1vw,27px); box-shadow:var(--shadow-sm);
  transition:transform .12s ease, color .12s ease;
}
.btn-ghost:hover{color:var(--ink); transform:translateY(-2px);}
.btn-ghost:active{transform:translateY(1px) scale(.98);}
/* 지금 무엇을 하면 되는지 알려 주는 줄. 점수가 아니라 안내다. */
.pickhint{
  margin:10px 0 0; text-align:center; flex:none;
  font-size:clamp(18px,1.9vw,25px); font-weight:800; color:var(--sub);
  letter-spacing:-.5px; text-wrap:balance;
}

/* ===== 무대 공통 ===== */
.scene{
  flex:1; width:100%; max-width:1200px; min-height:0;
  display:flex; align-items:center; justify-content:center; gap:28px;
}
.pulse{animation:pulse 1.3s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
@media (prefers-reduced-motion:reduce){.pulse{animation:none;}}

/* ===== 칭찬 오버레이 ===== */
#praise{
  position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,.94); backdrop-filter:blur(6px);
}
#praise[hidden]{display:none;}
#praise .pop{
  text-align:center; font-size:clamp(44px,7vw,88px); font-weight:800; letter-spacing:-2px;
  color:var(--green); animation:popin .45s cubic-bezier(.2,1.6,.4,1);
}
#praise .pop .pe{font-size:clamp(80px,13vw,170px); display:block;}
@keyframes popin{from{transform:scale(.3); opacity:0;}to{transform:scale(1); opacity:1;}}

/* ===== 소개 카드 ===== */
.introrow{flex-wrap:wrap;}
.np-card{
  flex:1; min-width:280px; max-width:440px; background:var(--card);
  border-radius:28px; padding:30px; text-align:center; box-shadow:var(--shadow-sm);
}
.np-card p{font-size:clamp(21px,2.3vw,30px); font-weight:800; margin:12px 0 0; letter-spacing:-.5px;}
.np-card .art{font-size:74px; line-height:1.15;}

/* ===== 사진 판 =====
   문서 기준: 카드 사이 간격을 넉넉히 둬서 오클릭을 줄인다.
   8장이 2행으로 들어가고, 아래 버튼까지 한 화면에 담겨야 한다. */
.photos{
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:clamp(14px,1.6vw,22px);
  width:100%; max-width:1080px; margin:0 auto; flex:none;
}
.photo{
  position:relative; background:var(--card); border-radius:22px;
  border:5px solid transparent;
  box-shadow:var(--shadow-sm);
  padding:10px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:transform .14s ease, box-shadow .14s ease, border-color .14s ease;
}
.photo:hover{transform:translateY(-4px); box-shadow:var(--shadow-md);}
.photo:active{transform:translateY(0) scale(.98);}
/* 사진 높이는 vh로 묶는다. 정사각형만 고집하면 4열 × 2행이
   1024×600에서 세로를 넘겨 지시문과 첫 줄이 잘린다. */
/* contain — 동물이 잘리지 않게 통째로 보여 준다.
   사진 배경이 밝은 회색 단색이라 카드 배경과 자연스럽게 이어진다. */
.photo img{
  width:100%; height:clamp(74px,17.5vh,190px); object-fit:contain;
  background:#F7F8FA; border-radius:15px; display:block; pointer-events:none;
}
/* 사진을 못 불러왔을 때 대신 보여주는 이모지 (문서 요구: 실습이 끊기지 않게) */
.photo .fallback{
  width:100%; height:clamp(74px,17.5vh,190px); border-radius:15px;
  background:var(--accent-soft);
  display:none; align-items:center; justify-content:center;
  font-size:clamp(42px,11vh,86px); line-height:1;
}
.photo.noimg img{display:none;}
.photo.noimg .fallback{display:flex;}
/* 선택 표시는 색만으로 하지 않는다 — 굵은 테두리 + 체크 + '선택됨' 글자 3중 */
.photo.on{border-color:var(--accent); background:var(--accent-soft);}
.photo .mark{
  position:absolute; top:8px; right:8px;
  width:clamp(38px,4vw,52px); height:clamp(38px,4vw,52px); border-radius:50%;
  background:var(--accent); color:#fff;
  display:none; align-items:center; justify-content:center;
  font-size:clamp(21px,2.3vw,29px); font-weight:800;
  box-shadow:0 3px 10px rgba(25,31,40,.25);
}
.photo.on .mark{display:flex;}
.photo .tag{
  margin-top:7px; font-weight:800; letter-spacing:-.5px;
  font-size:clamp(15px,1.5vw,20px); color:var(--sub);
  min-height:1.4em;
}
.photo.on .tag{color:var(--accent-deep);}

/* ===== 비지도학습: 그룹 나누기 ===== */
/* 사진을 누르면 그 자리에 그룹 버튼 두 개가 덮인다 (2단계 조작을 없앤다) */
/* 카드가 짧아도 버튼 세 개가 다 보여야 한다 — 카드 밖으로 넘쳐도 되게 띄운다 */
.photo .grouppick{
  position:absolute; left:-6px; right:-6px; top:50%; transform:translateY(-50%); z-index:6;
  background:#fff; border-radius:18px;
  box-shadow:0 10px 30px rgba(25,31,40,.22), 0 0 0 3px var(--accent-soft);
  display:none; flex-direction:column; align-items:stretch; justify-content:center; gap:7px;
  padding:9px;
}
.photo.asking{z-index:7;}
.photo.asking .grouppick{display:flex;}
.gbtn{
  min-height:clamp(46px,6.6vh,62px); border-radius:14px;
  font-weight:800; font-size:clamp(17px,1.9vw,24px); color:#fff;
  box-shadow:0 3px 10px rgba(25,31,40,.16);
}
.gbtn.a{background:var(--accent);}
.gbtn.b{background:var(--grape);}
.gbtn.cancel{background:#EDF0F5; color:var(--sub); min-height:clamp(36px,4.4vh,46px); font-size:clamp(15px,1.6vw,19px); box-shadow:none;}
/* 이미 어느 그룹인지 사진 위에 띠로 표시 */
.photo .gflag{
  position:absolute; top:8px; left:8px; z-index:2;
  border-radius:999px; padding:6px 14px;
  font-weight:800; font-size:clamp(15px,1.6vw,20px); color:#fff;
  display:none;
}
.photo.g-a .gflag, .photo.g-b .gflag{display:block;}
.photo.g-a{border-color:var(--accent);}
.photo.g-a .gflag{background:var(--accent);}
.photo.g-b{border-color:var(--grape);}
.photo.g-b .gflag{background:var(--grape);}
/* 아직 안 나눈 사진은 살짝 흐리게 — 남은 게 뭔지 한눈에 */
.photo.g-none{opacity:.92;}

/* 나누기 화면은 사진 8장 + 그룹칸 + 버튼이 모두 들어가야 해서 제일 빡빡하다.
   여기서만 사진을 한 단계 더 낮춘다. */
.sorting .photo img, .sorting .photo .fallback{height:clamp(66px,14.5vh,150px);}
.sorting .photo .fallback{font-size:clamp(36px,8.5vh,74px);}
.bins{
  display:flex; gap:20px; justify-content:center; width:100%; max-width:1080px;
  margin:14px auto 0; flex:none;
}
.bin{
  flex:1; background:var(--card); border-radius:22px; box-shadow:var(--shadow-sm);
  padding:12px 14px; text-align:center; border:4px solid transparent;
  transition:border-color .12s ease, background .12s ease, transform .12s ease;
}
.bin.a{border-color:var(--accent-soft);}
.bin.b{border-color:var(--grape-soft);}
/* 지금 이 상자 위에 놓으려는 중 — 어디에 놓이는지 크게 알려 준다 */
.bin.over{transform:scale(1.03);}
.bin.a.over{border-color:var(--accent); background:var(--accent-soft);}
.bin.b.over{border-color:var(--grape); background:var(--grape-soft);}
/* 끌고 있는 동안 원래 자리는 흐리게, 손을 따라오는 사본은 커서를 따라간다 */
.photo.dragging{opacity:.32;}
/* 손을 따라오는 사본. 놓을 상자를 가리지 않게 원본보다 작게 든다. */
.photo.dragghost{
  position:fixed; z-index:60; pointer-events:none; margin:0;
  opacity:.9; transform:rotate(-4deg) scale(.72);
  box-shadow:0 18px 40px rgba(25,31,40,.3);
}
.photo.dragghost .grouppick, .photo.dragghost .mark{display:none;}
/* 터치로 끌 때 화면이 같이 스크롤되지 않게 — 나누기 화면에서만 */
.sorting .photo{touch-action:none;}
.bin h3{
  margin:0 0 8px; font-size:clamp(19px,2vw,26px); font-weight:800; letter-spacing:-.5px;
}
.bin.a h3{color:var(--accent-deep);}
.bin.b h3{color:#5B3FD6;}
.binlist{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; min-height:clamp(40px,6vh,62px); align-items:center;}
.binlist .chip{
  width:clamp(38px,4.6vw,58px); height:clamp(38px,4.6vw,58px); border-radius:12px;
  overflow:hidden; box-shadow:0 2px 6px rgba(25,31,40,.14); background:var(--accent-soft);
  display:flex; align-items:center; justify-content:center; font-size:clamp(20px,2.4vw,30px);
}
.binlist .chip img{width:100%; height:100%; object-fit:cover; display:block;}
.binlist .empty{color:#C6CDD9; font-weight:800; font-size:clamp(15px,1.6vw,20px);}

/* ===== 비교 화면 ===== */
.comparow{
  display:flex; gap:24px; justify-content:center; align-items:stretch;
  width:100%; max-width:1100px; margin:0 auto; flex-wrap:wrap; flex:none;
}
.compacard{
  flex:1; min-width:290px; background:var(--card); border-radius:28px;
  padding:24px 22px; box-shadow:var(--shadow-sm); border-top:9px solid var(--accent);
}
.compacard.b{border-top-color:var(--grape);}
.compacard .ci{font-size:clamp(48px,6vw,74px); line-height:1.1; text-align:center;}
.compacard h3{
  margin:6px 0 14px; text-align:center; letter-spacing:-.8px;
  font-size:clamp(24px,2.6vw,34px); font-weight:800; color:var(--accent-deep);
}
.compacard.b h3{color:#5B3FD6;}
.compacard ul{margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:12px;}
.compacard li{
  font-size:clamp(19px,2.1vw,27px); font-weight:700; letter-spacing:-.5px;
  display:flex; gap:11px; align-items:flex-start; line-height:1.35;
}
.compacard li::before{content:'•'; color:var(--accent); font-weight:800;}
.compacard.b li::before{color:var(--grape);}

/* ===== 특징 고르기 (복수 선택) ===== */
.feats{
  display:flex; gap:18px; justify-content:center; flex-wrap:wrap;
  width:100%; max-width:1000px; margin:0 auto; flex:none;
}
.feat{
  position:relative; min-height:96px; min-width:240px; padding:18px 30px 18px 26px;
  border-radius:24px; background:var(--card); box-shadow:var(--shadow-sm);
  border:5px solid transparent;
  display:flex; align-items:center; gap:14px;
  font-size:clamp(21px,2.2vw,29px); font-weight:800; letter-spacing:-.5px;
  transition:transform .12s ease, border-color .12s ease, background .12s ease;
}
.feat:hover{transform:translateY(-3px);}
.feat .fi{font-size:clamp(30px,3.2vw,42px); line-height:1;}
.feat.on{border-color:var(--green); background:var(--green-soft);}
.feat .fmark{
  margin-left:auto; font-size:clamp(20px,2.2vw,28px); color:var(--green); font-weight:800;
  display:none;
}
.feat.on .fmark{display:inline;}

/* ===== 정리 카드 ===== */
.recap{
  background:var(--card); border-radius:30px; padding:30px 34px;
  box-shadow:var(--shadow-sm); max-width:960px; margin:0 auto; text-align:center; flex:none;
}
.recap .ri{font-size:clamp(56px,7vw,90px); line-height:1.1;}
.recap h2{
  margin:8px 0 14px; font-size:clamp(26px,3vw,40px); font-weight:800;
  letter-spacing:-1px; color:var(--accent-deep); text-wrap:balance;
}
.recap p{
  margin:0 0 12px; font-size:clamp(20px,2.2vw,29px); font-weight:700;
  line-height:1.55; color:var(--ink); text-wrap:balance;
}
.recap p.soft{color:var(--sub); font-weight:700; font-size:clamp(18px,1.9vw,25px); margin-bottom:0;}
.recap .keys{
  display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:16px;
}
.recap .keys span{
  background:var(--accent-soft); color:var(--accent-deep); border-radius:999px;
  padding:11px 22px; font-weight:800; font-size:clamp(17px,1.8vw,24px);
}

/* ===== 축하 ===== */
.confetti{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:1;}
.confetti span{position:absolute; top:-60px; font-size:36px; animation:fall linear infinite;}
@keyframes fall{to{transform:translateY(115vh) rotate(340deg);}}
@media (prefers-reduced-motion:reduce){.confetti span{animation:none; display:none;}}
.fin-sub{font-size:clamp(20px,2.2vw,30px); font-weight:700; color:var(--sub); margin:0 0 10px; line-height:1.7;}
.celebrate{text-align:center; margin:auto; position:relative; z-index:2;}
.celebrate .ce{font-size:clamp(90px,14vw,180px); line-height:1.1; display:block;
  filter:drop-shadow(0 14px 24px rgba(255,195,66,.4));}
.celebrate h2{font-size:clamp(32px,4.2vw,56px); font-weight:800; letter-spacing:-1.5px; color:var(--green); margin:16px 0 8px;}
.celebrate .btns{display:flex; gap:18px; justify-content:center; flex-wrap:wrap;}
.celebrate .btns .big-btn{margin-top:24px;}

@media (max-width:820px){
  .scene{flex-direction:column;}
  .hbtn{min-height:58px; padding:8px 16px;}
  .photos{grid-template-columns:repeat(2,1fr); max-width:560px;}
  .comparow{flex-direction:column;}
}
/* 세로가 짧은 화면(수업 노트북 768, 1024×600 관문) —
   사진 8장 + 그룹칸 + 버튼이 한 화면에 들어가야 한다.
   768도 빠듯해서 breakpoint를 860으로 잡았다. 760으로 두면 1366×768이 그냥 넘친다.
   버튼 높이 70px·글자 22px 하한은 유지하면서 여백만 깎는다. */
@media (max-height:860px){
  main#stage{padding:10px 18px;}
  .say{margin:0 0 8px; font-size:clamp(21px,2.7vw,30px);}
  .photos{gap:14px;}
  /* vh만으로 두면 768 화면에서 사진이 커져 아래가 잘린다 — 상한을 조인다 */
  .photo img, .photo .fallback{height:clamp(74px,17vh,150px);}
  .sorting .photo img, .sorting .photo .fallback{height:clamp(64px,12.8vh,114px);}
  .photo{padding:6px; border-width:4px;}
  .photo .tag{margin-top:3px; font-size:15px; min-height:1.2em;}
  .photo .mark{width:32px; height:32px; font-size:18px; top:6px; right:6px;}
  .bins{margin-top:8px; gap:14px;}
  .bin{padding:7px 11px; border-width:3px;}
  .bin h3{margin-bottom:4px; font-size:18px;}
  .binlist{min-height:34px; gap:6px;}
  .binlist .chip{width:34px; height:34px; border-radius:9px; font-size:19px;}
  /* 나누기 화면에선 사진 아래 이름표를 빼서 세로를 번다 (그룹은 위쪽 띠로 이미 보인다) */
  .sorting .photo .tag{display:none;}
  .big-btn{min-height:74px; padding:14px 40px; font-size:clamp(22px,2.2vw,28px);}
  .btn-ghost{min-height:72px; padding:13px 28px; font-size:clamp(20px,1.9vw,24px);}
  .btnrow{margin-top:10px; gap:16px;}
  .pickhint{margin-top:6px; font-size:18px;}
  .np-card{padding:16px;}
  .np-card .art{font-size:52px;}
  /* 홈: 카드 3개가 한 줄에 들어가야 한다 (줄바꿈되면 세 번째가 화면 밖) */
  .home h1{font-size:clamp(24px,3vw,34px); margin:0 0 4px;}
  .cards{margin-top:14px; gap:16px;}
  .card{width:min(240px,30vw); min-height:190px; gap:12px; border-radius:24px;}
  .cicon{width:84px; height:84px; font-size:44px;}
  .cname{font-size:clamp(19px,1.9vw,23px);}
  .badge{font-size:14px; padding:6px 12px; top:10px; right:10px;}
  .pickerlink{margin-top:16px; padding:11px 24px;}
  .recap{padding:14px 20px;}
  .recap .ri{font-size:44px;}
  .recap h2{margin:2px 0 7px; font-size:clamp(22px,2.6vw,30px);}
  .recap p{font-size:clamp(18px,2vw,24px); line-height:1.45; margin-bottom:8px;}
  .recap p.soft{font-size:clamp(16px,1.7vw,20px); margin-top:10px !important;}
  .recap .keys{margin-top:10px; gap:9px;}
  .recap .keys span{padding:8px 16px; font-size:17px;}
  .compacard{padding:15px 18px;}
  .compacard .ci{font-size:44px;}
  .compacard h3{margin:3px 0 9px;}
  .compacard ul{gap:8px;}
  .feat{min-height:78px; padding:12px 22px;}
  footer#dots{padding:8px;}
}
</style>
</head>
<body>
<header>
  <button class="hbtn" id="homeBtn" type="button">🏠 처음으로</button>
  <div id="title">AI는 어떻게 배울까요?</div>
  <button class="hbtn" id="volBtn" type="button" aria-label="소리 조절">🔊</button>
  <button class="hbtn" id="ttsBtn" type="button">💬 다시 듣기</button>
</header>
<main id="stage"></main>
<footer id="dots"></footer>
<div id="praise" hidden></div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const stage = $('#stage'), dots = $('#dots');

/* ===== 음성 (TTS) ===== */
let koVoice = null, lastTts = '';
function pickVoice(){
  try{ koVoice = speechSynthesis.getVoices().find(v => v.lang.replace('_','-').startsWith('ko')) || null; }catch(e){}
}
try{ speechSynthesis.onvoiceschanged = pickVoice; pickVoice(); }catch(e){}
const VOLS = [
  {v:1,   icon:'🔊', name:'소리 크게'},
  {v:.35, icon:'🔉', name:'소리 작게'},
  {v:0,   icon:'🔇', name:'소리 끔'},
];
let volIdx = 0;
try{ volIdx = (+localStorage.getItem('digibasic_vol') || 0) % 3; }catch(e){}
function updateVolBtn(){
  const s = VOLS[volIdx];
  $('#volBtn').textContent = s.icon;
  $('#volBtn').setAttribute('aria-label', s.name);
}
$('#volBtn').onclick = e => {
  e.currentTarget.blur();
  volIdx = (volIdx + 1) % 3;
  try{ localStorage.setItem('digibasic_vol', volIdx); }catch(e2){}
  updateVolBtn();
  speak(VOLS[volIdx].name + '로 바꿨어요');
};
function speak(t){
  if(!t) return;
  lastTts = t;
  console.log('[tts]', t);
  if(!VOLS[volIdx].v) return;
  try{
    speechSynthesis.cancel();
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(t);
      u.lang = 'ko-KR'; u.rate = .85; u.pitch = 1.02;
      u.volume = VOLS[volIdx].v;
      if(koVoice) u.voice = koVoice;
      speechSynthesis.speak(u);
    }, 60);
  }catch(e){}
}
updateVolBtn();
document.addEventListener('pointerdown', () => {
  try{ speechSynthesis.speak(new SpeechSynthesisUtterance(' ')); }catch(e){}
}, {once:true});
$('#ttsBtn').onclick = e => { e.currentTarget.blur(); speak(lastTts); };

/* ===== 진행 상태 ===== */
const KEY = 'digibasic_l3_v1';
let done = {};
try{ done = JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){}
function saveDone(id){ done[id] = true; try{ localStorage.setItem(KEY, JSON.stringify(done)); }catch(e){} }
const S = { screen:'home', mi:-1, si:0, sel:null, groups:null, feats:null };
let busy = false;

/* ===== 사진 데이터 (단일 소스) =====
   종류(kind)와 털색(tone)을 일부러 교차시켰다.
   그래야 비지도학습에서 '강아지/고양이'로도, '밝은색/어두운색'으로도 나눌 수 있고
   마지막 '어떤 특징을 보았나요?' 질문이 의미를 갖는다.
   images/ 사진이 없으면 이모지로 자동 대체된다(문서 요구사항). */
const PHOTOS = [
  {id:'ai01', kind:'dog', tone:'light', emoji:'🐶', alt:'밝은 색 강아지'},
  {id:'ai02', kind:'cat', tone:'light', emoji:'🐱', alt:'밝은 색 고양이'},
  {id:'ai03', kind:'dog', tone:'dark',  emoji:'🐕', alt:'어두운 색 강아지'},
  {id:'ai04', kind:'cat', tone:'dark',  emoji:'🐈', alt:'어두운 색 고양이'},
  {id:'ai05', kind:'dog', tone:'light', emoji:'🐩', alt:'밝은 색 강아지'},
  {id:'ai06', kind:'cat', tone:'light', emoji:'😺', alt:'밝은 색 고양이'},
  {id:'ai07', kind:'dog', tone:'dark',  emoji:'🦮', alt:'어두운 색 강아지'},
  {id:'ai08', kind:'cat', tone:'dark',  emoji:'🐈‍⬛', alt:'어두운 색 고양이'},
];
const KIND_NAME = {dog:'강아지', cat:'고양이'};
const photoById = id => PHOTOS.find(p => p.id === id);

/* 사진 한 장의 HTML.
   labeled=true(지도학습)면 이름표를 보여주고 alt에도 종류를 적는다.
   labeled=false(비지도학습)면 정답을 숨긴다 — 스크린리더로도 새어 나가면 안 된다. */
function photoCard(p, i, labeled){
  const alt = labeled ? p.alt : ('동물 사진 ' + (i + 1));
  const tag = labeled ? `<span class="tag">${KIND_NAME[p.kind]}</span>` : '<span class="tag"></span>';
  return `<button class="photo g-none" type="button" data-id="${p.id}" aria-pressed="false">
    <span class="mark" aria-hidden="true">✓</span>
    <span class="gflag" aria-hidden="true"></span>
    <img src="images/${p.id}.jpg" alt="${alt}" onerror="this.closest('.photo').classList.add('noimg')">
    <span class="fallback" aria-hidden="true">${p.emoji}</span>
    ${tag}
  </button>`;
}

/* ===== 소개 장면 ===== */
const sceneSupIntro = () => `<div class="scene introrow">
  <div class="np-card"><div class="art">🏷️🐶</div><p>사진마다 이름표가<br>붙어 있어요</p></div>
  <div class="np-card"><div class="art">🤖✅</div><p>정답을 알려주면서<br>AI를 가르쳐요</p></div>
</div>`;
const sceneUnsupIntro = () => `<div class="scene introrow">
  <div class="np-card"><div class="art">❓🐾</div><p>이번에는 이름표가<br>없어요</p></div>
  <div class="np-card"><div class="art">🧩</div><p>비슷한 것끼리<br>모아 볼까요?</p></div>
</div>`;
const sceneCompIntro = () => `<div class="scene introrow">
  <div class="np-card"><div class="art">🏷️</div><p>정답을 알려주는<br>공부</p></div>
  <div class="np-card"><div class="art">🧩</div><p>정답 없이 비슷한 것을<br>찾는 공부</p></div>
</div>`;

/* ===== 학습 내용 (단일 데이터) =====
   문서의 5개 화면을 3파트로 묶었다. */
const MODULES = [
  { id:'supervised', title:'정답을 알려주며 가르치기', icon:'🏷️',
    doneMsg:'지도학습을 알게 되었어요!', steps:[
    { type:'info', scene:sceneSupIntro, text:'사진마다 이름표가 붙어 있어요' },
    { type:'pick', kind:'dog', text:'강아지 사진만 골라 보세요' },
    { type:'pick', kind:'cat', text:'이번에는 고양이만 골라 보세요' },
    { type:'recap', icon:'🏷️',
      title:'정답이 있는 사진으로 AI를 가르쳤어요',
      body:'각 사진에는 강아지 또는 고양이라는 이름표가 붙어 있었어요.<br>이처럼 정답이 있는 자료로 AI를 가르치는 방법을<br><b>지도학습</b>이라고 합니다.',
      keys:['정답이 있어요','이름표가 있어요','정답을 보고 배워요'],
      text:'정답이 있는 공부를 지도학습이라고 해요' },
  ]},
  { id:'unsupervised', title:'비슷한 것끼리 모으기', icon:'🧩',
    doneMsg:'비지도학습을 알게 되었어요!', steps:[
    { type:'info', scene:sceneUnsupIntro, text:'이번에는 이름표가 없어요' },
    { type:'sort', text:'비슷한 사진끼리 아래로 옮겨 보세요' },
    { type:'recap', icon:'🧩',
      title:'정답 없이 비슷한 것끼리 묶었어요',
      body:'정답을 알려주지 않았는데도<br>비슷한 특징을 보고 두 그룹으로 나누었어요.<br>이런 공부 방법을 <b>비지도학습</b>이라고 합니다.',
      keys:['정답이 없어요','비슷한 점을 찾아요','끼리끼리 모아요'],
      soft:'사람마다 중요하게 본 특징이 다를 수 있어요.<br>어떤 기준으로 나누었는지 이야기해 볼까요?',
      text:'정답 없이 묶는 공부를 비지도학습이라고 해요' },
  ]},
  { id:'compare', title:'두 가지를 비교해요', icon:'⚖️',
    doneMsg:'두 가지 공부 방법을 비교했어요!', steps:[
    { type:'info', scene:sceneCompIntro, text:'두 가지 공부 방법을 비교해 봐요' },
    { type:'compare', text:'무엇이 다른지 살펴보세요' },
    { type:'feature', text:'사진을 나눌 때 무엇을 보았나요?' },
    { type:'recap', icon:'🤖',
      title:'AI도 여러 특징을 함께 봅니다',
      body:'AI도 색, 모양, 크기처럼<br>여러 특징에서 반복되는 무늬를 찾아냅니다.',
      keys:['색깔','모양','크기'],
      text:'AI도 여러 특징에서 반복되는 무늬를 찾아요' },
  ]},
];

/* ===== 칭찬 ===== */
const PRAISES = ['참 잘했어요!','정말 멋져요!','최고예요!','아주 잘했어요!'];
let praiseN = 0;
function praise(cb){
  const t = PRAISES[praiseN++ % PRAISES.length];
  $('#praise').innerHTML = `<div class="pop"><span class="pe">🎉</span>${t}</div>`;
  $('#praise').hidden = false;
  speak(t);
  setTimeout(() => { $('#praise').hidden = true; cb && cb(); }, 1800);
}

/* ===== 진행/화면 전환 ===== */
function renderDots(){
  const m = MODULES[S.mi];
  dots.innerHTML = (S.screen === 'play' && m)
    ? m.steps.map((_,i) => `<span class="d ${i < S.si ? 'done' : i === S.si ? 'cur' : ''}"></span>`).join('')
    : '';
}
function runStep(){
  const m = MODULES[S.mi], step = m.steps[S.si];
  S.screen = 'play';
  stage.classList.toggle('sorting', step.type === 'sort');   // 나누기 화면만 사진을 더 낮춘다
  renderDots();
  speak(step.text);
  RUN[step.type](step, stage);
}
function nextStep(){
  const m = MODULES[S.mi];
  if(S.si >= m.steps.length - 1){ saveDone(m.id); celebrate(m); }
  else { S.si++; runStep(); }
}
function winStep(){
  if(busy) return;
  busy = true;
  praise(() => { busy = false; nextStep(); });
}
/* 파트 하나를 끝내면 축하 화면. 세 파트 모두 끝나면 finale. */
function celebrate(m){
  S.screen = 'celebrate';
  stage.classList.remove('sorting');
  renderDots();
  if(MODULES.every(x => done[x.id])){ finale(); return; }
  stage.innerHTML = `<div class="celebrate">
    <span class="ce">🏆</span>
    <h2>${m.doneMsg}</h2>
    <div class="btns">
      <button class="big-btn green" id="againBtn" type="button">🔄 한 번 더</button>
      <button class="big-btn" id="homeBtn2" type="button">🏠 처음으로</button>
    </div>
  </div>`;
  speak(m.doneMsg);
  $('#againBtn').onclick = () => { S.si = 0; runStep(); };
  $('#homeBtn2').onclick = goHome;
}
function finale(){
  const E = ['🎉','🎊','⭐','🌸'];
  const conf = Array.from({length:16}, (_, i) =>
    `<span style="left:${(i * 6.3 + 2) % 96}%; animation-duration:${2.6 + (i % 5) * .5}s; animation-delay:${(i % 7) * .45}s">${E[i % 4]}</span>`).join('');
  stage.innerHTML = `<div class="confetti" aria-hidden="true">${conf}</div>
    <div class="celebrate">
      <span class="ce">🎓</span>
      <h2>AI가 배우는 방법을 알게 되었어요!</h2>
      <p class="fin-sub">지도학습 ✅&ensp;비지도학습 ✅&ensp;비교하기 ✅<br>정말 대단해요!</p>
      <div class="btns">
        <button class="big-btn green" id="againBtn" type="button">🔄 한 번 더</button>
        <button class="big-btn" id="homeBtn2" type="button">🏠 처음으로</button>
      </div>
    </div>`;
  speak('와! AI가 배우는 방법을 모두 알게 되었어요. 정말 대단해요!');
  $('#againBtn').onclick = () => { S.si = 0; runStep(); };
  $('#homeBtn2').onclick = goHome;
}
function startModule(i){
  S.mi = i; S.si = 0;
  $('#title').textContent = MODULES[i].title;
  runStep();
}
/* 파트가 3개라 카드 선택 화면(내부 홈)을 둔다. 여기서 index로도 나갈 수 있다. */
function goHome(){
  S.screen = 'home'; S.mi = -1;
  stage.classList.remove('sorting');
  try{ speechSynthesis.cancel(); }catch(e){}
  $('#title').textContent = 'AI는 어떻게 배울까요?';
  renderDots();
  stage.innerHTML = `<div class="home">
    <h1>무엇을 해 볼까요?</h1>
    <div class="cards">${MODULES.map((m,i) => `
      <button class="card" data-i="${i}" type="button">
        ${done[m.id] ? '<span class="badge">✅ 해냈어요</span>' : ''}
        <span class="cicon">${m.icon}</span>
        <span class="cname">${m.title}</span>
      </button>`).join('')}
    </div>
    <a class="pickerlink" href="index.html">📚 다른 수업 고르기</a>
  </div>`;
  lastTts = '하고 싶은 공부를 눌러 보세요.';
  stage.querySelectorAll('.card').forEach(c => c.onclick = () => startModule(+c.dataset.i));
}
$('#homeBtn').onclick = e => { e.currentTarget.blur(); goHome(); };

/* ===== 단계 실행기 ===== */
const RUN = {
  info(step, el){
    el.innerHTML = `<p class="say" role="status">${step.text}</p>${step.scene()}
      <div class="btnrow"><button class="big-btn" id="nextBtn" type="button">다음 ▶</button></div>`;
    $('#nextBtn').onclick = e => { e.currentTarget.blur(); nextStep(); };
  },

  /* ── 지도학습: 이름표를 보고 한 종류만 고르기 ──
     오답도 선택은 된다. 막지 않고 부드럽게 알려 준 뒤 스스로 고치게 한다. */
  pick(step, el){
    S.sel = new Set();
    const want = KIND_NAME[step.kind];
    el.innerHTML = `<p class="say" role="status">${step.text}</p>
      <div class="photos">${PHOTOS.map((p,i) => photoCard(p, i, true)).join('')}</div>
      <div class="btnrow">
        <button class="btn-ghost" id="resetBtn" type="button">🔄 다시 고르기</button>
        <button class="big-btn" id="nextBtn" type="button" disabled>다음 ▶</button>
      </div>
      <p class="pickhint" id="pickHint" role="status">${want} 사진을 모두 골라 주세요</p>`;

    el.querySelectorAll('.photo').forEach(btn => {
      btn.onclick = () => {
        const p = photoById(btn.dataset.id);
        if(S.sel.has(p.id)){
          S.sel.delete(p.id);
          speak('선택을 풀었어요.');
        } else {
          S.sel.add(p.id);
          // 다른 종류를 골랐을 때 — '틀렸다'가 아니라 무엇인지만 알려 준다
          if(p.kind !== step.kind) speak(`이건 ${KIND_NAME[p.kind]}예요. 다시 골라 볼까요?`);
          else speak(want);
        }
        renderPick(step);
      };
    });
    $('#resetBtn').onclick = e => {
      e.currentTarget.blur();
      S.sel.clear(); renderPick(step);
      speak('다시 골라 보세요.');
    };
    $('#nextBtn').onclick = e => { e.currentTarget.blur(); winStep(); };
    renderPick(step);
  },

  /* ── 비지도학습: 이름표 없이 두 그룹으로 나누기 ──
     정답이 없다. 어떻게 나누든 다음으로 갈 수 있다. */
  sort(step, el){
    S.groups = {};
    el.innerHTML = `<p class="say" role="status">${step.text}</p>
      <div class="photos">${PHOTOS.map((p,i) => photoCard(p, i, false)).join('')}</div>
      <div class="bins">
        <div class="bin a" data-g="a"><h3>🅰️ 이쪽 무리</h3><div class="binlist" id="binA"></div></div>
        <div class="bin b" data-g="b"><h3>🅱️ 저쪽 무리</h3><div class="binlist" id="binB"></div></div>
      </div>
      <div class="btnrow">
        <button class="btn-ghost" id="resetBtn" type="button">🔄 다시 나누기</button>
        <button class="big-btn" id="nextBtn" type="button" disabled>결과 보기 ▶</button>
      </div>
      <p class="pickhint" id="sortHint" role="status">사진을 끌어다 놓거나, 눌러서 고를 수 있어요</p>`;

    el.querySelectorAll('.photo').forEach(btn => {
      armDrag(btn);                                  // 끌어다 놓기 (누르기도 그대로 된다)
      // 사진을 누르면 그 자리에 그룹 버튼이 덮인다
      btn.onclick = ev => {
        if(ev.target.closest('.gbtn')) return;      // 그룹 버튼은 아래에서 따로 처리
        if(btn.dataset.dragged === '1'){ btn.dataset.dragged = ''; return; }  // 끌어 옮긴 직후면 메뉴 안 연다
        const open = btn.classList.contains('asking');
        el.querySelectorAll('.photo.asking').forEach(o => {
          o.classList.remove('asking');
          o.querySelector('.grouppick').innerHTML = '';
        });
        if(open) return;                             // 같은 사진 다시 누르면 닫기
        btn.classList.add('asking');
        btn.querySelector('.grouppick').innerHTML =
          `<button class="gbtn a" type="button" data-g="a">🅰️ 이쪽</button>
           <button class="gbtn b" type="button" data-g="b">🅱️ 저쪽</button>
           <button class="gbtn cancel" type="button" data-g="">그만두기</button>`;
        btn.querySelectorAll('.gbtn').forEach(g => {
          g.onclick = e2 => {
            e2.stopPropagation();
            const to = g.dataset.g;
            btn.classList.remove('asking');
            btn.querySelector('.grouppick').innerHTML = '';
            if(!to) return;
            S.groups[btn.dataset.id] = to;
            renderSort();
            speak(to === 'a' ? '이쪽 무리로 옮겼어요.' : '저쪽 무리로 옮겼어요.');
          };
        });
        speak('어느 쪽에 넣을까요?');
      };
      // 각 사진에 그룹 버튼이 들어갈 자리를 미리 만들어 둔다
      btn.insertAdjacentHTML('beforeend', '<span class="grouppick"></span>');
    });
    $('#resetBtn').onclick = e => {
      e.currentTarget.blur();
      S.groups = {}; renderSort();
      speak('다시 나누어 보세요.');
    };
    $('#nextBtn').onclick = e => { e.currentTarget.blur(); winStep(); };
    renderSort();
  },

  compare(step, el){
    el.innerHTML = `<p class="say" role="status">${step.text}</p>
      <div class="comparow">
        <div class="compacard">
          <div class="ci" aria-hidden="true">🏷️</div>
          <h3>지도학습</h3>
          <ul><li>정답이 있어요</li><li>사람이 이름을 알려줘요</li><li>정답을 보고 구분해요</li></ul>
        </div>
        <div class="compacard b">
          <div class="ci" aria-hidden="true">🧩</div>
          <h3>비지도학습</h3>
          <ul><li>정답이 없어요</li><li>비슷한 점을 스스로 찾아요</li><li>끼리끼리 모아요</li></ul>
        </div>
      </div>
      <div class="btnrow"><button class="big-btn" id="nextBtn" type="button">다음 ▶</button></div>`;
    $('#nextBtn').onclick = e => { e.currentTarget.blur(); nextStep(); };
  },

  /* ── 특징 고르기 (복수 선택, 정답 없음) ── */
  feature(step, el){
    S.feats = new Set();
    const FEATS = [
      {id:'face', icon:'😊', name:'얼굴 모양'},
      {id:'ear',  icon:'👂', name:'귀 모양'},
      {id:'fur',  icon:'🎨', name:'털 색깔'},
      {id:'body', icon:'🐾', name:'몸의 형태'},
      {id:'all',  icon:'✨', name:'여러 가지를 함께 봤어요'},
    ];
    el.innerHTML = `<p class="say" role="status">${step.text}</p>
      <div class="feats">${FEATS.map(f => `
        <button class="feat" type="button" data-id="${f.id}" aria-pressed="false">
          <span class="fi" aria-hidden="true">${f.icon}</span>${f.name}
          <span class="fmark" aria-hidden="true">✓ 선택됨</span>
        </button>`).join('')}
      </div>
      <div class="btnrow"><button class="big-btn" id="nextBtn" type="button" disabled>다음 ▶</button></div>`;

    el.querySelectorAll('.feat').forEach(btn => {
      btn.onclick = () => {
        const f = FEATS.find(x => x.id === btn.dataset.id);
        if(S.feats.has(f.id)){ S.feats.delete(f.id); }
        else { S.feats.add(f.id); speak(f.name); }
        btn.classList.toggle('on', S.feats.has(f.id));
        btn.setAttribute('aria-pressed', S.feats.has(f.id) ? 'true' : 'false');
        $('#nextBtn').disabled = S.feats.size === 0;
      };
    });
    $('#nextBtn').onclick = e => { e.currentTarget.blur(); nextStep(); };
  },

  /* ── 정리 카드 (개념 설명) ── */
  recap(step, el){
    el.innerHTML = `<p class="say" role="status">${step.text}</p>
      <div class="recap">
        <div class="ri" aria-hidden="true">${step.icon}</div>
        <h2>${step.title}</h2>
        <p>${step.body}</p>
        ${step.keys ? `<div class="keys">${step.keys.map(k => `<span>${k}</span>`).join('')}</div>` : ''}
        ${step.soft ? `<p class="soft" style="margin-top:16px">${step.soft}</p>` : ''}
      </div>
      <div class="btnrow"><button class="big-btn green" id="nextBtn" type="button">다 알았어요 ▶</button></div>`;
    $('#nextBtn').onclick = e => { e.currentTarget.blur(); winStep(); };
  },
};

/* 지도학습 화면 다시 그리기 — 선택 표시와 '다음' 버튼 상태 */
function renderPick(step){
  const want = KIND_NAME[step.kind];
  let right = 0, wrong = 0;
  stage.querySelectorAll('.photo').forEach(btn => {
    const p = photoById(btn.dataset.id);
    const on = S.sel.has(p.id);
    btn.classList.toggle('on', on);
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    // 이름표 + 선택 여부를 글자로도 남긴다 (색만으로 구분하지 않기)
    btn.querySelector('.tag').textContent = on ? `${KIND_NAME[p.kind]} · 선택됨` : KIND_NAME[p.kind];
    if(on){ p.kind === step.kind ? right++ : wrong++; }
  });
  const total = PHOTOS.filter(p => p.kind === step.kind).length;
  const ok = right === total && wrong === 0;
  $('#nextBtn').disabled = !ok;
  // 남은 안내 — 점수가 아니라 '무엇을 하면 되는지'만 말한다
  $('#pickHint').textContent = ok
    ? `${want}를 모두 골랐어요. 다음으로 가 볼까요?`
    : wrong > 0
      ? `${want}가 아닌 사진이 있어요. 눌러서 선택을 풀 수 있어요`
      : `${want} 사진을 모두 골라 주세요`;
}

/* ===== 끌어다 놓기 =====
   사진을 아래 두 상자로 끌어 옮긴다.
   드래그는 발달장애 학습자에게 어려운 조작이라 '누르기'를 없애지 않는다 —
   조금이라도 움직여야 드래그로 치고, 그냥 누르면 기존 그룹 버튼이 뜬다. */
const DRAG_MIN = 12;                 // 이만큼 움직여야 드래그로 본다 (손떨림 무시)
function armDrag(btn){
  let id = null, sx = 0, sy = 0, moving = false, ghost = null;

  btn.addEventListener('pointerdown', e => {
    if(e.button !== undefined && e.button !== 0) return;
    if(e.target.closest('.gbtn')) return;
    id = e.pointerId; sx = e.clientX; sy = e.clientY; moving = false;
  });

  btn.addEventListener('pointermove', e => {
    if(id === null || e.pointerId !== id) return;
    const dx = e.clientX - sx, dy = e.clientY - sy;
    if(!moving){
      if(Math.hypot(dx, dy) < DRAG_MIN) return;      // 아직 클릭으로 본다
      moving = true;
      btn.setPointerCapture(id);
      // 손가락/커서를 따라다니는 반투명 사진
      ghost = btn.cloneNode(true);
      ghost.className = 'photo dragghost';
      const r = btn.getBoundingClientRect();
      ghost.style.width = r.width + 'px';
      ghost.style.height = r.height + 'px';
      document.body.appendChild(ghost);
      btn.classList.add('dragging');
      // 열려 있던 그룹 메뉴는 닫는다
      stage.querySelectorAll('.photo.asking').forEach(o => {
        o.classList.remove('asking'); o.querySelector('.grouppick').innerHTML = '';
      });
      speak('놓고 싶은 곳에 놓아요.');
    }
    ghost.style.left = (e.clientX - ghost.offsetWidth / 2) + 'px';
    ghost.style.top  = (e.clientY - ghost.offsetHeight / 2) + 'px';
    // 지금 어느 상자 위인지 표시
    const over = binUnder(e.clientX, e.clientY);
    stage.querySelectorAll('.bin').forEach(b => b.classList.toggle('over', b === over));
  });

  const finish = e => {
    if(id === null || (e.pointerId !== undefined && e.pointerId !== id)) return;
    const wasMoving = moving;
    const x = e.clientX, y = e.clientY;
    id = null; moving = false;
    if(ghost){ ghost.remove(); ghost = null; }
    btn.classList.remove('dragging');
    stage.querySelectorAll('.bin').forEach(b => b.classList.remove('over'));
    if(!wasMoving) return;                       // 안 움직였으면 그냥 클릭
    btn.dataset.dragged = '1';                   // 뒤따라 오는 click을 무시하게 표시
    const bin = binUnder(x, y);
    if(bin){
      S.groups[btn.dataset.id] = bin.dataset.g;
      renderSort();
      speak(bin.dataset.g === 'a' ? '이쪽 무리에 놓았어요.' : '저쪽 무리에 놓았어요.');
    } else {
      speak('상자 안에 놓아 주세요.');           // 엉뚱한 데 놓아도 그대로 둔다
    }
  };
  btn.addEventListener('pointerup', finish);
  btn.addEventListener('pointercancel', finish);
}
/* 그 좌표 아래에 있는 상자 찾기 */
function binUnder(x, y){
  return [...stage.querySelectorAll('.bin')].find(b => {
    const r = b.getBoundingClientRect();
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  }) || null;
}

/* 비지도학습 화면 다시 그리기 — 그룹 표시와 아래 담긴 사진들 */
function renderSort(){
  const bins = {a:[], b:[]};
  stage.querySelectorAll('.photo').forEach(btn => {
    const id = btn.dataset.id, g = S.groups[id];
    btn.classList.toggle('g-a', g === 'a');
    btn.classList.toggle('g-b', g === 'b');
    btn.classList.toggle('g-none', !g);
    btn.querySelector('.gflag').textContent = g === 'a' ? '🅰️ 이쪽' : g === 'b' ? '🅱️ 저쪽' : '';
    btn.querySelector('.tag').textContent = g === 'a' ? '이쪽 무리' : g === 'b' ? '저쪽 무리' : '';
    if(g) bins[g].push(id);
  });
  ['a','b'].forEach(g => {
    const el = $('#bin' + g.toUpperCase());
    el.innerHTML = bins[g].length
      ? bins[g].map(id => {
          const p = photoById(id);
          return `<span class="chip"><img src="images/${p.id}.jpg" alt=""
            onerror="this.parentNode.textContent='${p.emoji}'"></span>`;
        }).join('')
      : '<span class="empty">아직 없어요</span>';
  });
  // 정답은 없다. 8장을 다 나누기만 하면 열린다.
  const placed = Object.keys(S.groups).length;
  $('#nextBtn').disabled = placed < PHOTOS.length;
  // 문서 요구: 진행 상태를 "3 / 8"로 보여 준다. 점수가 아니라 남은 양이다.
  const hint = $('#sortHint');
  if(hint) hint.textContent = placed === 0
    ? '사진을 끌어다 놓거나, 눌러서 고를 수 있어요'
    : placed < PHOTOS.length
      ? `${placed} / ${PHOTOS.length} 장을 옮겼어요`
      : '다 옮겼어요. 결과를 볼까요?';
}

goHome();
</script>
