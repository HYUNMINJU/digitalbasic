<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>디지털 기초 4차시 — AI와 이야기 나누기</title>
<style>
:root{
  --bg:#F4F6FA; --ink:#191F28; --sub:#6B7684; --card:#FFFFFF;
  --accent:#3182F6; --accent-deep:#1B64DA; --accent-soft:#EBF3FF;
  --green:#0BA360; --green-soft:#E6F6EC; --sun:#FFC342; --sun-soft:#FFF4D6;
  --hair:rgba(25,31,40,.07);
  --shadow-sm:0 1px 3px rgba(25,31,40,.05), 0 4px 14px rgba(25,31,40,.06);
  --shadow-md:0 2px 6px rgba(25,31,40,.05), 0 14px 34px rgba(25,31,40,.10);
  color-scheme: light;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; height:100%;}
body{
  font-family:"Pretendard Variable",Pretendard,"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:var(--bg); color:var(--ink);
  display:flex; flex-direction:column;
  min-height:100vh; min-height:100dvh;
  touch-action:manipulation;
  -webkit-user-select:none; user-select:none;
}
button{font:inherit; color:inherit; cursor:pointer; border:none; background:none;}
button:focus-visible{outline:4px solid #94C1FF; outline-offset:3px;}

/* ===== 셸 ===== */
header{
  display:flex; align-items:center; gap:14px;
  padding:14px 22px; background:var(--card);
  box-shadow:0 1px 0 var(--hair), 0 4px 16px rgba(25,31,40,.04);
  position:relative; z-index:5;
}
#title{
  flex:1; text-align:center; font-weight:800;
  font-size:clamp(20px,2.2vw,30px); letter-spacing:-.5px;
}
.hbtn{
  min-height:68px; padding:10px 26px; border-radius:999px;
  background:#F2F4F8; font-weight:700;
  font-size:clamp(17px,1.7vw,24px);
  transition:background .15s ease, transform .1s ease;
}
.hbtn:hover{background:#E8ECF2;}
.hbtn:active{transform:scale(.96);}

main#stage{
  flex:1; min-height:0; overflow:auto;
  display:flex; flex-direction:column; align-items:center;
  padding:20px 22px;
}
footer#dots{
  display:flex; align-items:center; justify-content:center; gap:10px; padding:16px;
  flex-wrap:wrap;
}
footer#dots:empty{display:none;}
.d{width:13px; height:13px; border-radius:999px; background:#D8DEE8; transition:all .25s ease;}
.d.done{background:var(--green);}
.d.cur{width:38px; background:var(--accent);}

/* ===== 지시문 ===== */
.say{
  margin:6px 0 12px; text-align:center; font-weight:800;
  font-size:clamp(24px,3.1vw,40px); letter-spacing:-1px; text-wrap:balance;
}

/* ===== 홈 ===== */
.home{width:100%; max-width:1500px; text-align:center; margin:auto;}
.home h1{font-size:clamp(30px,3.8vw,52px); font-weight:800; letter-spacing:-1.5px;}
.cards{display:flex; gap:26px; justify-content:center; flex-wrap:wrap; margin-top:34px;}
.card{
  position:relative; width:min(330px,90vw); min-height:300px;
  background:var(--card); border-radius:32px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
  box-shadow:var(--shadow-sm);
  transition:transform .18s ease, box-shadow .18s ease;
}
.card:hover{transform:translateY(-6px); box-shadow:var(--shadow-md);}
.card:active{transform:translateY(0) scale(.98);}
.cicon{
  width:140px; height:140px; border-radius:50%; background:var(--accent-soft);
  display:flex; align-items:center; justify-content:center;
  font-size:72px; line-height:1;
}
.cname{font-size:clamp(23px,2.3vw,32px); font-weight:800; letter-spacing:-.5px; padding:0 12px;}
.badge{
  position:absolute; top:18px; right:18px; background:var(--green-soft); color:#087F46;
  border-radius:999px; padding:9px 18px; font-weight:800; font-size:17px;
}
.pickerlink{
  display:inline-block; margin-top:34px; padding:14px 30px; border-radius:999px;
  background:var(--card); color:var(--sub); font-weight:700;
  font-size:clamp(17px,1.8vw,23px); text-decoration:none; box-shadow:var(--shadow-sm);
  transition:transform .12s ease, color .12s ease;
}
.pickerlink:hover{color:var(--accent); transform:translateY(-2px);}
.pickerlink:focus-visible{outline:4px solid #94C1FF; outline-offset:3px;}

/* ===== 큰 버튼 ===== */
.big-btn{
  flex:none;
  min-height:88px; min-width:260px; padding:16px 46px;
  border-radius:999px;
  background:var(--accent); color:#fff; font-weight:800;
  font-size:clamp(23px,2.4vw,32px); letter-spacing:-.5px;
  box-shadow:0 10px 26px rgba(49,130,246,.35);
  transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
}
.big-btn:hover{filter:brightness(1.06);}
.big-btn:active{transform:translateY(2px) scale(.98); box-shadow:0 5px 14px rgba(49,130,246,.3);}
.big-btn.green{background:var(--green); box-shadow:0 10px 26px rgba(11,163,96,.35);}
.big-btn.green:active{box-shadow:0 5px 14px rgba(11,163,96,.3);}
.big-btn[disabled]{background:#D8DEE8; color:#8B95A5; box-shadow:none; cursor:default;}
.big-btn[disabled]:hover{filter:none;}
.big-btn[disabled]:active{transform:none;}
.btnrow{
  display:flex; gap:20px; justify-content:center; align-items:center; flex-wrap:wrap;
  margin-top:14px; flex:none;
}
.btn-ghost{
  min-height:76px; padding:14px 32px; border-radius:999px;
  background:var(--card); color:var(--sub); font-weight:800;
  font-size:clamp(20px,2vw,26px); box-shadow:var(--shadow-sm);
  transition:transform .12s ease, color .12s ease;
}
.btn-ghost:hover{color:var(--ink); transform:translateY(-2px);}
.btn-ghost:active{transform:translateY(1px) scale(.98);}

/* ===== 무대 공통 ===== */
.scene{
  flex:1; width:100%; max-width:1200px; min-height:0;
  display:flex; align-items:center; justify-content:center; gap:28px;
}
@media (prefers-reduced-motion:reduce){*{animation:none !important;}}

/* ===== 칭찬 오버레이 ===== */
#praise{
  position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,.94); backdrop-filter:blur(6px);
}
#praise[hidden]{display:none;}
#praise .pop{
  text-align:center; font-size:clamp(44px,7vw,88px); font-weight:800; letter-spacing:-2px;
  color:var(--green); animation:popin .45s cubic-bezier(.2,1.6,.4,1);
}
#praise .pop .pe{font-size:clamp(80px,13vw,170px); display:block;}
@keyframes popin{from{transform:scale(.3); opacity:0;}to{transform:scale(1); opacity:1;}}

/* ===== 소개 카드 ===== */
.introrow{flex-wrap:wrap;}
.np-card{
  flex:1; min-width:280px; max-width:440px; background:var(--card);
  border-radius:28px; padding:30px; text-align:center; box-shadow:var(--shadow-sm);
}
.np-card p{font-size:clamp(21px,2.3vw,30px); font-weight:800; margin:12px 0 0; letter-spacing:-.5px;}
.np-card .art{font-size:74px; line-height:1.15;}

/* ===== 대화창 =====
   기록만 스크롤되고 입력칸·키보드는 항상 화면에 남아야 한다.
   1024×600에서 이게 안 되면 학생이 보내기 버튼을 못 찾는다. */
.chatwrap{
  width:100%; max-width:940px; margin:0 auto; flex:1; min-height:0;
  display:flex; flex-direction:column;
}
.chatlog{
  flex:1; min-height:0; overflow-y:auto;
  background:var(--card); border-radius:24px; box-shadow:var(--shadow-sm);
  padding:16px 18px;
  display:flex; flex-direction:column; gap:12px;
}
.bubble{
  max-width:78%; padding:14px 20px; border-radius:22px;
  font-size:clamp(20px,2.1vw,28px); font-weight:700; line-height:1.4;
  letter-spacing:-.5px; word-break:keep-all; position:relative;
  animation:bubblein .25s ease;
}
@keyframes bubblein{from{transform:translateY(8px); opacity:0;}to{transform:none; opacity:1;}}
/* AI = 왼쪽 + 로봇 얼굴 + 회색. 색 말고 위치·아이콘으로도 구분된다 */
.bubble.ai{
  align-self:flex-start; background:#F1F3F7; color:var(--ink);
  border-bottom-left-radius:7px; padding-left:60px;
}
.bubble.ai::before{
  content:'🤖'; position:absolute; left:14px; top:11px; font-size:32px; line-height:1;
}
/* 나 = 오른쪽 + 파랑 */
.bubble.me{
  align-self:flex-end; background:var(--accent); color:#fff;
  border-bottom-right-radius:7px;
}
/* AI가 붙잡은 낱말 — 노랗게 반짝인다 (reveal 단계의 핵심) */
.bubble .kw{
  background:var(--sun); color:#4A3200; border-radius:8px;
  padding:1px 7px; font-weight:800;
  box-shadow:0 0 0 0 rgba(255,195,66,.9);
  animation:kwglow 1s ease-in-out 3;
}
@keyframes kwglow{
  0%,100%{box-shadow:0 0 0 0 rgba(255,195,66,.85);}
  50%{box-shadow:0 0 0 10px rgba(255,195,66,0);}
}
/* AI가 생각하는 중 — 점 세 개 */
.bubble.think{color:var(--sub);}
.bubble.think span{
  display:inline-block; width:11px; height:11px; margin:0 3px; border-radius:50%;
  background:#B6BEC9; animation:dotjump 1.1s ease-in-out infinite;
}
.bubble.think span:nth-child(2){animation-delay:.18s;}
.bubble.think span:nth-child(3){animation-delay:.36s;}
@keyframes dotjump{0%,60%,100%{transform:none; opacity:.5;}30%{transform:translateY(-7px); opacity:1;}}

/* ===== 입력칸 ===== */
/* 진짜 <input>이 아니다 — 한/영 상태와 상관없이 동작해야 하기 때문.
   화면 키보드나 문장 카드로 채운 결과만 보여 준다. */
.inputbar{
  display:flex; align-items:center; gap:14px; margin-top:12px; flex:none;
}
.inputbox{
  flex:1; min-height:clamp(64px,9vh,86px);
  background:var(--card); border-radius:20px; box-shadow:var(--shadow-sm);
  border:4px solid transparent;
  display:flex; align-items:center; gap:2px; padding:10px 20px; overflow:hidden;
  font-size:clamp(22px,2.3vw,30px); font-weight:800; letter-spacing:-.5px;
}
.inputbox.ready{border-color:var(--accent); background:var(--accent-soft);}
.inputbox .ph{color:#C6CDD9;}
/* 채워 넣을 빈칸 */
.inputbox .slot{
  min-width:96px; display:inline-block; text-align:center;
  border-bottom:5px solid var(--accent); color:var(--accent-deep);
  margin:0 5px; padding-bottom:2px;
}
.inputbox .slot.empty{border-bottom-color:#C6CDD9;}
.inputbox .caret{
  display:inline-block; width:5px; height:clamp(26px,3.4vh,34px);
  background:var(--accent); border-radius:3px; animation:blink 1s steps(1) infinite;
}
@keyframes blink{50%{opacity:0;}}
.sendbtn{
  flex:none; min-height:clamp(64px,9vh,86px); min-width:150px; padding:12px 30px;
  border-radius:20px; background:var(--accent); color:#fff; font-weight:800;
  font-size:clamp(21px,2.2vw,28px); letter-spacing:-.5px;
  box-shadow:0 6px 18px rgba(49,130,246,.32);
  transition:transform .12s ease, filter .12s ease;
}
.sendbtn:hover{filter:brightness(1.06);}
.sendbtn:active{transform:translateY(2px) scale(.98);}
.sendbtn[disabled]{background:#D8DEE8; color:#8B95A5; box-shadow:none; cursor:default;}
.sendbtn[disabled]:hover{filter:none;}
.sendbtn[disabled]:active{transform:none;}

/* ===== 문장 카드 ===== */
.saycards{
  display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:12px; flex:none;
}
.saycard{
  flex:1; min-width:200px; max-width:300px; min-height:76px; padding:14px 20px;
  border-radius:20px; background:var(--card); box-shadow:var(--shadow-sm);
  border:4px solid transparent;
  font-size:clamp(19px,2vw,26px); font-weight:800; letter-spacing:-.5px;
  display:flex; align-items:center; justify-content:center; text-align:center;
  word-break:keep-all; transition:transform .12s ease, border-color .12s ease;
}
.saycard:hover{transform:translateY(-3px);}
.saycard.on{border-color:var(--accent); background:var(--accent-soft); color:var(--accent-deep);}
.saycard[disabled]{opacity:.45; cursor:default;}
.saycard[disabled]:hover{transform:none;}

/* ===== 화면 키보드 (2차시에서 가져옴) =====
   한/영 상태와 무관하게 한글을 조립하기 위해 실제 입력 대신 이걸 쓴다. */
.kb{
  display:flex; flex-direction:column; gap:5px; margin:10px auto 0;
  background:#E9EDF4; border-radius:18px; padding:9px;
  width:min(94vw,820px); box-shadow:var(--shadow-sm); flex:none;
}
.kb-row{display:flex; gap:5px; justify-content:center;}
.key{
  flex:1; max-width:62px; min-width:0;
  min-height:clamp(30px,4.8vh,52px);
  background:var(--card); border-radius:10px;
  box-shadow:0 2px 0 #D0D7E2;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-weight:700; font-size:clamp(9px,1.2vw,13px); color:var(--sub);
  transition:transform .08s ease;
}
.key:active{transform:translateY(2px); box-shadow:none;}
.key b{font-size:clamp(13px,1.8vw,19px); color:var(--ink);}
.key.wide{max-width:130px;}
.key.space{flex:6; max-width:400px;}
/* 다음에 누를 키 — 파랗게 알려 준다 */
.key.kb-target{background:var(--accent); box-shadow:0 2px 0 var(--accent-deep); color:#fff;}
.key.kb-target b{color:#fff;}
.key.kb-target{animation:keypulse 1.3s ease-in-out infinite;}
@keyframes keypulse{0%,100%{filter:none;}50%{filter:brightness(1.18);}}

/* ===== 설명 줄 ===== */
.explain{
  margin:12px auto 0; max-width:900px; flex:none;
  background:var(--sun-soft); border-radius:18px; padding:14px 22px;
  text-align:center; font-weight:800; letter-spacing:-.5px;
  font-size:clamp(19px,2vw,26px); color:#5C4200; text-wrap:balance;
  animation:bubblein .3s ease;
}
.explain b{background:var(--sun); border-radius:7px; padding:1px 8px;}
.hintline{
  margin:10px 0 0; text-align:center; flex:none;
  font-size:clamp(18px,1.9vw,24px); font-weight:800; color:var(--sub);
  letter-spacing:-.5px; text-wrap:balance;
}

/* ===== 정리 카드 ===== */
.recap{
  background:var(--card); border-radius:30px; padding:28px 32px;
  box-shadow:var(--shadow-sm); max-width:940px; margin:0 auto; text-align:center; flex:none;
}
.recap .ri{font-size:clamp(54px,7vw,86px); line-height:1.1;}
.recap h2{
  margin:8px 0 14px; font-size:clamp(25px,2.9vw,38px); font-weight:800;
  letter-spacing:-1px; color:var(--accent-deep); text-wrap:balance;
}
.recap p{
  margin:0 0 12px; font-size:clamp(20px,2.1vw,28px); font-weight:700;
  line-height:1.55; color:var(--ink); text-wrap:balance;
}
.recap p.soft{color:var(--sub); font-size:clamp(18px,1.9vw,25px); margin-bottom:0;}
.recap .keys{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:16px;}
.recap .keys span{
  background:var(--accent-soft); color:var(--accent-deep); border-radius:999px;
  padding:11px 22px; font-weight:800; font-size:clamp(17px,1.8vw,24px);
}

/* ===== 축하 ===== */
.confetti{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:1;}
.confetti span{position:absolute; top:-60px; font-size:36px; animation:fall linear infinite;}
@keyframes fall{to{transform:translateY(115vh) rotate(340deg);}}
@media (prefers-reduced-motion:reduce){.confetti span{display:none;}}
.fin-sub{font-size:clamp(20px,2.2vw,30px); font-weight:700; color:var(--sub); margin:0 0 10px; line-height:1.7;}
.celebrate{text-align:center; margin:auto; position:relative; z-index:2;}
.celebrate .ce{font-size:clamp(90px,14vw,180px); line-height:1.1; display:block;
  filter:drop-shadow(0 14px 24px rgba(255,195,66,.4));}
.celebrate h2{font-size:clamp(32px,4.2vw,56px); font-weight:800; letter-spacing:-1.5px; color:var(--green); margin:16px 0 8px;}
.celebrate .btns{display:flex; gap:18px; justify-content:center; flex-wrap:wrap;}
.celebrate .btns .big-btn{margin-top:24px;}

@media (max-width:820px){
  .scene{flex-direction:column;}
  .hbtn{min-height:58px; padding:8px 16px;}
  .saycards{flex-direction:column; align-items:stretch;}
  .saycard{max-width:none;}
}
/* 세로가 짧은 화면 — 3차시와 같은 860px 기준.
   760으로 두면 1366×768이 스타일을 못 받아 그냥 넘친다(3차시에서 실제로 겪은 버그). */
@media (max-height:860px){
  main#stage{padding:10px 18px;}
  .say{margin:0 0 8px; font-size:clamp(21px,2.6vw,30px);}
  .chatlog{padding:11px 14px; gap:9px; border-radius:20px;}
  .bubble{padding:10px 16px; font-size:clamp(18px,1.9vw,24px);}
  .bubble.ai{padding-left:50px;}
  .bubble.ai::before{font-size:26px; left:12px; top:9px;}
  .inputbar{margin-top:9px; gap:11px;}
  /* 문서 기준 하한(높이 70px·글자 22px·간격 16px)은 여기서도 지킨다 */
  .inputbox{min-height:72px; padding:8px 16px; font-size:clamp(22px,2vw,26px); border-width:3px;}
  .sendbtn{min-height:72px; min-width:140px; padding:10px 24px; font-size:clamp(22px,2vw,25px);}
  .saycards{margin-top:9px; gap:16px;}
  .saycard{min-height:72px; padding:11px 14px; font-size:clamp(22px,1.9vw,24px); border-width:3px;}
  .kb{margin-top:8px; padding:7px; gap:4px; border-radius:14px;}
  .key{min-height:30px; border-radius:8px;}
  .explain{margin-top:9px; padding:11px 18px; font-size:clamp(18px,1.9vw,24px);}
  .hintline{margin-top:7px; font-size:18px;}
  .big-btn{min-height:72px; padding:13px 36px; font-size:clamp(21px,2.1vw,27px);}
  .btn-ghost{min-height:72px; padding:12px 26px; font-size:clamp(19px,1.9vw,24px);}
  .btnrow{margin-top:10px; gap:16px;}
  .np-card{padding:16px;}
  .np-card .art{font-size:52px;}
  .recap{padding:15px 20px;}
  .recap .ri{font-size:46px;}
  .recap h2{margin:3px 0 8px; font-size:clamp(22px,2.5vw,30px);}
  .recap p{font-size:clamp(18px,2vw,24px); line-height:1.45; margin-bottom:8px;}
  .recap .keys{margin-top:10px; gap:9px;}
  .recap .keys span{padding:8px 16px; font-size:17px;}
  /* 홈: 카드 3장이 한 줄에 */
  .home h1{font-size:clamp(24px,3vw,34px); margin:0 0 4px;}
  .cards{margin-top:14px; gap:16px;}
  .card{width:min(240px,30vw); min-height:190px; gap:12px; border-radius:24px;}
  .cicon{width:84px; height:84px; font-size:44px;}
  .cname{font-size:clamp(19px,1.9vw,23px);}
  .badge{font-size:14px; padding:6px 12px; top:10px; right:10px;}
  .pickerlink{margin-top:16px; padding:11px 24px;}
  footer#dots{padding:8px;}
}
</style>
</head>
<body>
<header>
  <button class="hbtn" id="homeBtn" type="button">🏠 처음으로</button>
  <div id="title">AI와 이야기 나누기</div>
  <button class="hbtn" id="volBtn" type="button" aria-label="소리 조절">🔊</button>
  <button class="hbtn" id="ttsBtn" type="button">💬 다시 듣기</button>
</header>
<main id="stage"></main>
<footer id="dots"></footer>
<div id="praise" hidden></div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const stage = $('#stage'), dots = $('#dots');

/* ===== 음성 (TTS) ===== */
let koVoice = null, lastTts = '';
function pickVoice(){
  try{ koVoice = speechSynthesis.getVoices().find(v => v.lang.replace('_','-').startsWith('ko')) || null; }catch(e){}
}
try{ speechSynthesis.onvoiceschanged = pickVoice; pickVoice(); }catch(e){}
const VOLS = [
  {v:1,   icon:'🔊', name:'소리 크게'},
  {v:.35, icon:'🔉', name:'소리 작게'},

/* ===== 한글 조합 (2차시에서 가져옴) =====
   자모 배열(['ㄴ','ㅏ','ㄹ','ㅆ','ㅣ'])을 음절로 합친다.
   여기서 직접 조합하는 이유: 진짜 <input>을 쓰면 한/영 모드가 영문일 때
   '날씨' 대신 'skfTl'가 찍히고 학생은 이유도 모른 채 막힌다. */
const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const JONG = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const isJung = c => JUNG.indexOf(c) >= 0;
function syllable(cho, jung, jong){
  const ci = CHO.indexOf(cho), ji = JUNG.indexOf(jung), ki = jong ? JONG.indexOf(jong) : 0;
  if(ci < 0 || ji < 0 || ki < 0) return cho + jung + (jong || '');
  return String.fromCharCode(0xAC00 + (ci * 21 + ji) * 28 + ki);
}
function composeHangul(jamo){
  let out = '', i = 0;
  while(i < jamo.length){
    const c = jamo[i];
    if(CHO.indexOf(c) >= 0 && isJung(jamo[i+1])){
      const cho = c, jung = jamo[i+1];
      let jong = '', used = 2;
      const nx = jamo[i+2];
      if(nx && JONG.indexOf(nx) > 0 && !isJung(jamo[i+3])){ jong = nx; used = 3; }
      out += syllable(cho, jung, jong);
      i += used;
    } else { out += c; i++; }
  }
  return out;
}

/* ===== 대화 규칙 (단일 데이터 소스) =====
   일부러 아주 단순하게 뒀다 — 복잡하면 '원리'가 안 보인다.
   keys 중 하나가 문장에 들어 있으면 그 reply를 쓴다. 먼저 걸리는 게 이긴다. */
const RULES = [
  {keys:['날씨','더워','추워'],   reply:'오늘은 맑고 따뜻해요. 산책하기 좋아요!'},
  {keys:['안녕','반가'],          reply:'안녕하세요! 만나서 반가워요.'},
  {keys:['이름'],                 reply:'저는 컴퓨터 친구예요. 이름을 지어 주세요!'},
  {keys:['밥','점심','먹'],       reply:'맛있는 걸 드셨나요? 저는 못 먹어서 부러워요.'},
  {keys:['노래','음악'],          reply:'저도 노래 좋아해요. 어떤 노래를 좋아하세요?'},
  {keys:['기분','좋아','행복'],   reply:'좋은 기분이 저한테도 전해져요. 고마워요!'},
  {keys:['고마','감사'],          reply:'천만에요. 저도 즐거웠어요!'},
];
const FALLBACK = '음... 그건 잘 모르겠어요. 다른 걸 물어봐 주세요!';
/* 문장에서 걸린 규칙을 찾는다. 없으면 null → 모르겠다고 답한다. */
function matchRule(text){
  for(const r of RULES){
    for(const k of r.keys){
      if(text.indexOf(k) >= 0) return {rule:r, key:k};
    }
  }
  return null;
}

/* 말풍선 하나 추가. html=true면 노란 강조 표시를 살린다. */
function addBubble(cls, content, asHtml){
  const log = $('#chatlog');
  if(!log) return null;
  const b = document.createElement('div');
  b.className = 'bubble ' + cls;
  if(asHtml) b.innerHTML = content; else b.textContent = content;
  log.appendChild(b);
  log.scrollTop = log.scrollHeight;
  return b;
}
/* AI 답변을 한 글자씩 흘려 보낸다 — '지금 말하는 중' 느낌.
   전체 1초 안쪽으로 끝내야 한다. 기다림이 길면 부담이 된다. */
function typeOut(el, text, cb){
  let i = 0;
  const log = $('#chatlog');
  const step = () => {
    el.textContent = text.slice(0, ++i);
    if(log) log.scrollTop = log.scrollHeight;
    if(i < text.length) setTimeout(step, 22);
    else cb && cb();
  };
  step();
}
/* 보낸 말에서 걸린 낱말을 노랗게 감싼다 */
function markKeyword(text, key){
  if(!key) return text;
  const i = text.indexOf(key);
  if(i < 0) return text;
  return text.slice(0, i) + `<span class="kw">${key}</span>` + text.slice(i + key.length);
}

/* 실제 전송 — 세 스텝이 공유한다 */
function doSend(step){
  if(S.talking || !S.draft) return;
  S.talking = true;
  const text = S.draft;
  const hit = matchRule(text);

  // reveal 단계면 걸린 낱말을 노랗게 표시해서 보낸다
  addBubble('me', step.reveal ? markKeyword(text, hit && hit.key) : text, !!step.reveal);
  S.draft = '';
  if(S.typed) S.typed = [];
  renderSendUI(step);

  if(step.reveal){
    const ex = $('#explain');
    if(ex){
      ex.innerHTML = hit
        ? `<b>${hit.key}</b> 라는 낱말을 보고 답을 골랐어요`
        : `아는 낱말이 하나도 없어서 모르겠다고 해요`;
      speak(hit ? `${hit.key} 라는 낱말을 봤어요` : '아는 낱말이 없어요');
    }
  }

  // 생각하는 중 → 답변
  const think = addBubble('think ai', '', true);
  think.innerHTML = '<span></span><span></span><span></span>';
  setTimeout(() => {
    think.classList.remove('think');
    think.innerHTML = '';
    const reply = hit ? hit.rule.reply : FALLBACK;
    typeOut(think, reply, () => {
      S.talking = false;
      S.sent++;
      speak(reply);
      renderSendUI(step);
    });
  }, 550);
}

/* 입력칸·카드·키보드·버튼 상태를 한 번에 다시 그린다 */
function renderSendUI(step){
  const box = $('#inputbox'), send = $('#sendBtn'), next = $('#nextBtn');
  if(!box) return;

  if(step.mode === 'fill'){
    // 빈칸 채우기 — 앞뒤 글자는 고정, 가운데만 학생이 채운다
    const typed = S.typed || [];
    const shown = composeHangul(typed);
    // 낱말을 끝까지 채워야 보낼 수 있다. 중간에 보내지면 '노 좋아해요'가 되어 버린다.
    const complete = typed.length === step.word.length;
    box.innerHTML = `${step.before}<span class="slot${complete ? '' : ' empty'}">${shown || '&nbsp;'}</span>${step.after}`;
    S.draft = complete ? step.before + shown + step.after : '';
    box.classList.toggle('ready', !!S.draft);
    // 다음에 누를 키를 파랗게
    const nextJamo = step.word[(S.typed || []).length];
    const kbw = $('#kbwrap');
    if(kbw) kbw.innerHTML = kbScene(nextJamo ? KO2CODE[nextJamo] : null);
    bindKeyboard(step);
  } else {
    box.innerHTML = S.draft
      ? `${S.draft}<span class="caret"></span>`
      : `<span class="ph">여기에 말이 들어와요</span><span class="caret"></span>`;
    box.classList.toggle('ready', !!S.draft);
    stage.querySelectorAll('.saycard').forEach(c => {
      c.classList.toggle('on', c.dataset.say === S.draft);
      c.disabled = S.talking;
    });
  }
  if(send) send.disabled = !S.draft || S.talking;
  if(next) next.disabled = S.sent < (step.need || 1);

  const hint = $('#sendHint');
  if(hint){
    hint.textContent = S.talking ? 'AI가 답하고 있어요...'
      : S.sent >= (step.need || 1) ? '잘했어요! 다음으로 갈 수 있어요'
      : S.draft ? '이제 📨 보내기를 눌러요'
      : step.mode === 'fill'
        ? ((S.typed && S.typed.length) ? '조금만 더 — 파란 키를 눌러요' : '파란 키를 눌러 낱말을 써요')
        : '하고 싶은 말을 눌러 골라요';
  }
}

/* 화면 키보드 버튼 연결 (빈칸 채우기 전용) */
function bindKeyboard(step){
  stage.querySelectorAll('.kb .key').forEach(k => {
    k.onclick = () => {
      if(S.talking) return;
      const code = k.dataset.code;
      if(code === 'Backspace'){
        if(S.typed.length){ S.typed.pop(); renderSendUI(step); speak('지웠어요'); }
        return;
      }
      const jamo = KO[code.startsWith('Key') ? code[3] : ''];
      if(!jamo) return;
      const want = step.word[S.typed.length];
      if(jamo !== want){
        // 틀린 키 — 막지 않고 부드럽게 안내만 (실패 상태 없음)
        speak('파란 키를 눌러 보세요');
        return;
      }
      S.typed.push(jamo);
      renderSendUI(step);
      if(S.typed.length === step.word.length) speak(composeHangul(step.word));
      else speak(jamo);
    };
  });
}

/* ===== 단계 실행기 ===== */
const RUN = {
  info(step, el){
    el.innerHTML = `<p class="say" role="status">${step.text}</p>${step.scene()}
      <div class="btnrow"><button class="big-btn" id="nextBtn" type="button">다음 ▶</button></div>`;
    $('#nextBtn').onclick = e => { e.currentTarget.blur(); nextStep(); };
  },

  /* 대화창 — mode에 따라 문장 카드 또는 빈칸 채우기 */
  send(step, el){
    S.draft = ''; S.sent = 0; S.talking = false;
    S.typed = step.mode === 'fill' ? [] : null;

    const bottom = step.mode === 'fill'
      ? `<div class="kbwrap" id="kbwrap"></div>`
      : `<div class="saycards">${step.cards.map(c =>
          `<button class="saycard" type="button" data-say="${c}">${c}</button>`).join('')}</div>`;

    el.innerHTML = `<p class="say" role="status">${step.text}</p>
      <div class="chatwrap">
        <div class="chatlog" id="chatlog" role="log" aria-live="polite"></div>
        <div class="inputbar">
          <div class="inputbox" id="inputbox" aria-live="polite"></div>
          <button class="sendbtn" id="sendBtn" type="button" disabled>📨 보내기</button>
        </div>
        ${bottom}
        ${step.reveal ? '<div class="explain" id="explain">말을 보내면 AI가 무엇을 봤는지 알려 줄게요</div>' : ''}
        <p class="hintline" id="sendHint" role="status"></p>
      </div>
      <div class="btnrow"><button class="big-btn" id="nextBtn" type="button" disabled>다음 ▶</button></div>`;

    addBubble('ai', '안녕하세요! 무엇이든 말해 보세요.');

    if(step.mode === 'cards'){
      el.querySelectorAll('.saycard').forEach(c => {
        c.onclick = () => {
          if(S.talking) return;
          S.draft = c.dataset.say;
          renderSendUI(step);
          speak(S.draft);
        };
      });
    }
    $('#sendBtn').onclick = e => { e.currentTarget.blur(); doSend(step); };
    $('#nextBtn').onclick = e => { e.currentTarget.blur(); winStep(); };
    renderSendUI(step);
  },

  recap(step, el){
    el.innerHTML = `<p class="say" role="status">${step.text}</p>
      <div class="recap">
        <div class="ri" aria-hidden="true">${step.icon}</div>
        <h2>${step.title}</h2>
        <p>${step.body}</p>
        ${step.keys ? `<div class="keys">${step.keys.map(k => `<span>${k}</span>`).join('')}</div>` : ''}
        ${step.soft ? `<p class="soft" style="margin-top:16px">${step.soft}</p>` : ''}
      </div>
      <div class="btnrow"><button class="big-btn green" id="nextBtn" type="button">다 알았어요 ▶</button></div>`;
    $('#nextBtn').onclick = e => { e.currentTarget.blur(); winStep(); };
  },
};

goHome();
</script>
